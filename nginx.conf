events {
  worker_connections 1024;
}

http {
  client_max_body_size 100M;
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
  gzip_min_length 1024;

  # Rate limiting
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

  upstream api_upstream {
    server api:4000;
    keepalive 32;
  }

  upstream web_upstream {
    server web:3000;
    keepalive 16;
  }

  # ─── HTTP → HTTPS Redirect ──────────────────────────
  server {
    listen 80;
    server_name _; # Replace with: yourdomain.com www.yourdomain.com

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ─── HTTPS Main Server ──────────────────────────────
  server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com; # ← Change this

    # SSL (uncomment after certbot setup)
    # ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # ─── Frontend (Next.js) ─────────────────────────
    location / {
      proxy_pass http://web_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }

    # ─── API ────────────────────────────────────────
    location /api/ {
      limit_req zone=api_limit burst=40 nodelay;
      proxy_pass http://api_upstream/api/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_connect_timeout 60s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;
    }

    # ─── Health Check (no rate limit) ───────────────
    location /health {
      proxy_pass http://api_upstream/health;
      proxy_set_header Host $host;
      access_log off;
    }

    # ─── WebSocket (Socket.IO) ──────────────────────
    location /socket.io/ {
      proxy_pass http://api_upstream/socket.io/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 86400s; # 24h — keep WS alive
    }

    # ─── Static file caching ────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
      proxy_pass http://web_upstream;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }
  }
}
